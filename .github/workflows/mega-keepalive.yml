name: MEGA Keepalive

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MEGA_PATH: ${{ vars.MEGA_PATH }}
      MEGA_SYNC_ROOT: ${{ vars.MEGA_SYNC_ROOT }}
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://mega.nz/linux/repo/xUbuntu_24.04/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/meganz.gpg
          echo "deb [signed-by=/etc/apt/keyrings/meganz.gpg] https://mega.nz/linux/repo/xUbuntu_24.04/ ./" | sudo tee /etc/apt/sources.list.d/meganz.list
          sudo apt-get update
          sudo apt-get install -y megacmd

      - name: Verify required secrets
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${MEGA_EMAIL}"
          test -n "${MEGA_PASSWORD}"

      - name: Login and verify MEGA access
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          export MEGA_PATH="${MEGA_PATH:-/}"
          mega-login "${MEGA_EMAIL}" "${MEGA_PASSWORD}"
          mega-ls "${MEGA_PATH}"

      - name: Upload and delete a probe file
        run: |
          set -euo pipefail
          export MEGA_PATH="${MEGA_PATH:-/}"
          probe_name="codex-keepalive-$(date +%s).txt"
          probe_path="$(mktemp)"
          if [ "${MEGA_PATH}" = "/" ]; then
            remote_probe="/${probe_name}"
          else
            remote_probe="${MEGA_PATH%/}/${probe_name}"
          fi
          printf 'keepalive %s\n' "$(date -u +%FT%TZ)" > "${probe_path}"
          mega-put "${probe_path}" "${remote_probe}"
          mega-rm "${remote_probe}"
          rm -f "${probe_path}"

      - name: Sync source repositories to MEGA
        run: |
          set -euo pipefail
          export MEGA_PATH="${MEGA_PATH:-/}"
          export MEGA_SYNC_ROOT="${MEGA_SYNC_ROOT:-}"

          if [ -z "${MEGA_SYNC_ROOT}" ]; then
            if [ "${MEGA_PATH}" = "/" ]; then
              MEGA_SYNC_ROOT="/source-sync"
            else
              MEGA_SYNC_ROOT="${MEGA_PATH%/}/source-sync"
            fi
          fi

          workdir="$(mktemp -d)"
          cleanup() {
            rm -rf "${workdir}"
          }
          trap cleanup EXIT

          sync_repo() {
            local label="$1"
            local url="$2"
            local repo_dir="${workdir}/${label}"
            local archive_path="${workdir}/${label}.tar.gz"
            local remote_dir="${MEGA_SYNC_ROOT%/}/${label}"
            local remote_archive="${remote_dir}/latest.tar.gz"

            git clone --depth 1 "${url}" "${repo_dir}"
            tar --exclude-vcs -czf "${archive_path}" -C "${repo_dir}" .
            mega-mkdir -p "${remote_dir}"
            mega-rm "${remote_archive}" >/dev/null 2>&1 || true
            mega-put "${archive_path}" "${remote_archive}"
          }

          sync_repo "server-slots" "https://github.com/slotopol/server"
          sync_repo "bot" "https://github.com/slotopol/bot"

      - name: Logout
        if: always()
        run: mega-logout || true

      - name: Send failure email
        if: ${{ failure() && secrets.SMTP_SERVER != '' && secrets.SMTP_PORT != '' && secrets.SMTP_USERNAME != '' && secrets.SMTP_PASSWORD != '' && secrets.SMTP_TO != '' && secrets.SMTP_FROM != '' }}
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[GitHub Actions] MEGA Keepalive failed"
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          body: |
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref_name }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The MEGA keepalive or repository sync job failed.
