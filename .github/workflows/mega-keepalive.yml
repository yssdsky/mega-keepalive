name: MEGA Keepalive

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 */5 * *"

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MEGA_PATH: ${{ vars.MEGA_PATH }}
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://mega.nz/linux/repo/xUbuntu_24.04/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/meganz.gpg
          echo "deb [signed-by=/etc/apt/keyrings/meganz.gpg] https://mega.nz/linux/repo/xUbuntu_24.04/ ./" | sudo tee /etc/apt/sources.list.d/meganz.list
          sudo apt-get update
          sudo apt-get install -y megacmd

      - name: Verify required secrets
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${MEGA_EMAIL}"
          test -n "${MEGA_PASSWORD}"

      - name: Login and verify MEGA access
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          export MEGA_PATH="${MEGA_PATH:-/}"
          mega-login "${MEGA_EMAIL}" "${MEGA_PASSWORD}"
          mega-ls "${MEGA_PATH}"

      - name: Upload and delete a probe file
        run: |
          set -euo pipefail
          export MEGA_PATH="${MEGA_PATH:-/}"
          probe_name="codex-keepalive-$(date +%s).txt"
          probe_path="$(mktemp)"
          if [ "${MEGA_PATH}" = "/" ]; then
            remote_probe="/${probe_name}"
          else
            remote_probe="${MEGA_PATH%/}/${probe_name}"
          fi
          printf 'keepalive %s\n' "$(date -u +%FT%TZ)" > "${probe_path}"
          mega-put "${probe_path}" "${remote_probe}"
          mega-rm "${remote_probe}"
          rm -f "${probe_path}"

      - name: Logout
        if: always()
        run: mega-logout || true

      - name: Check failure email config
        if: ${{ failure() }}
        id: notify_config
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          set -euo pipefail
          if [ -n "${SMTP_SERVER}" ] && [ -n "${SMTP_PORT}" ] && [ -n "${SMTP_USERNAME}" ] && [ -n "${SMTP_PASSWORD}" ] && [ -n "${SMTP_TO}" ] && [ -n "${SMTP_FROM}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Send failure email
        if: ${{ failure() && steps.notify_config.outputs.enabled == 'true' }}
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[GitHub Actions] MEGA Keepalive failed"
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          body: |
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref_name }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The MEGA keepalive job failed.
