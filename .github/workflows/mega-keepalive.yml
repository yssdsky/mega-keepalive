name: MEGA Keepalive

on:
  workflow_dispatch:
  schedule:
    - cron: "17 0 * * *"

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      MEGA_PATH: /
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://mega.nz/linux/repo/xUbuntu_24.04/Release.key | sudo gpg --dearmor -o /etc/apt/keyrings/meganz.gpg
          echo "deb [signed-by=/etc/apt/keyrings/meganz.gpg] https://mega.nz/linux/repo/xUbuntu_24.04/ ./" | sudo tee /etc/apt/sources.list.d/meganz.list
          sudo apt-get update
          sudo apt-get install -y megacmd

      - name: Verify required secrets
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${MEGA_EMAIL}"
          test -n "${MEGA_PASSWORD}"

      - name: Login and verify MEGA access
        env:
          MEGA_EMAIL: ${{ secrets.MEGA_EMAIL }}
          MEGA_PASSWORD: ${{ secrets.MEGA_PASSWORD }}
        run: |
          set -euo pipefail
          mega-login "${MEGA_EMAIL}" "${MEGA_PASSWORD}"
          mega-ls "${MEGA_PATH}"

      - name: Upload and delete a probe file
        run: |
          set -euo pipefail
          probe_name="codex-keepalive-$(date +%s).txt"
          probe_path="$(mktemp)"
          if [ "${MEGA_PATH}" = "/" ]; then
            remote_probe="/${probe_name}"
          else
            remote_probe="${MEGA_PATH%/}/${probe_name}"
          fi
          printf 'keepalive %s\n' "$(date -u +%FT%TZ)" > "${probe_path}"
          mega-put "${probe_path}" "${remote_probe}"
          mega-rm "${remote_probe}"
          rm -f "${probe_path}"

      - name: Logout
        if: always()
        run: mega-logout || true
