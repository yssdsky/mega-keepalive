name: Sync Forks

on:
  workflow_dispatch:
  schedule:
    - cron: "27 0 * * *"

jobs:
  sync-forks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Verify sync token
        env:
          FORK_SYNC_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          test -n "${FORK_SYNC_TOKEN}"

      - name: Sync fork repositories
        env:
          GH_TOKEN: ${{ secrets.FORK_SYNC_TOKEN }}
        run: |
          set -euo pipefail
          gh repo sync yssdsky/server-slots -b main
          gh repo sync yssdsky/bot -b main

      - name: Check failure email config
        if: ${{ failure() }}
        id: notify_config
        env:
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: |
          set -euo pipefail
          if [ -n "${SMTP_SERVER}" ] && [ -n "${SMTP_PORT}" ] && [ -n "${SMTP_USERNAME}" ] && [ -n "${SMTP_PASSWORD}" ] && [ -n "${SMTP_TO}" ] && [ -n "${SMTP_FROM}" ]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Send failure email
        if: ${{ failure() && steps.notify_config.outputs.enabled == 'true' }}
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[GitHub Actions] Sync Forks failed"
          to: ${{ secrets.SMTP_TO }}
          from: ${{ secrets.SMTP_FROM }}
          body: |
            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Branch: ${{ github.ref_name }}
            Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            The fork sync job failed.
